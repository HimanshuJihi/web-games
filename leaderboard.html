    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .content-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            margin-top: 60px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            line-height: 1.6;
        }
        h1 {
            font-size: 2.5rem;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 20px;
        }
        p { font-size: 1.05rem; color: #d1d8e0; text-align: center; }
        .exit-button {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: background 0.3s;
        }
        .exit-button:hover { background-color: rgba(255, 255, 255, 0.4); }
        
        #leaderboard-container {
            margin-top: 20px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .game-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .leaderboard-item .game-title {
            font-weight: 600;
            font-size: 1.2rem;
        }
        .leaderboard-item .game-score {
            font-weight: bold;
            color: #FFD700; /* Gold color for scores */
            font-size: 1.1rem;
            margin-top: 4px;
        }
        .play-now-btn {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s, transform 0.2s;
            white-space: nowrap;
            margin-left: 20px;
        }
        .play-now-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
    </style>
</head>

    <a href="index.html" class="exit-button">← Back</a>

        <h1>🏆 Global Leaderboards</h1>
        <p>Your personal best scores across all Mlampic Games. All data is saved on your device.</p>
        <div id="leaderboard-container">
