<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Archery</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #00695C; /* Dark Teal */
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px #000000;
        }
        #gameCanvas {
            background-color: #4DB6AC; /* Lighter Teal */
            border: 5px solid #004D40;
            border-radius: 10px;
            max-width: 90vw;
            max-height: 70vh;
            aspect-ratio: 16 / 9;
        }
        .info {
            color: white;
            font-size: 24px;
            margin-top: 10px;
            width: 90%;
            max-width: 500px;
            display: flex;
            justify-content: space-around;
        }
        .exit-button {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            z-index: 10;
        }
        #arrow-selection {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }
        .arrow-btn {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid white;
            background-color: transparent;
            color: white;
            border-radius: 5px;
            transition: background-color 0.2s, color 0.2s;
        }
        .arrow-btn.selected {
            background-color: white;
            color: #00695C;
        }

        /* Orientation Warning & Mobile Landscape adjustments */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #004D40; /* Dark Teal */
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 22px;
            padding: 20px;
            box-sizing: border-box;
        }
        .rotate-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotateIcon 2s infinite ease-in-out;
        }
        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        @media screen and (max-width: 899px) and (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }
        @media screen and (max-width: 899px) and (orientation: landscape) {
            h1 { font-size: 20px; margin: 2px 0; }
            #gameCanvas { max-width: 95vw; max-height: 80vh; }
            .info { font-size: 16px; margin-top: 5px; }
            .exit-button { padding: 5px 10px; font-size: 12px; top: 5px; left: 5px; }
            .arrow-btn { padding: 4px 10px; font-size: 14px; }
            #gameControlButton { margin-top: 5px !important; padding: 5px 15px !important; font-size: 16px !important; }
        }
        
        /* Desktop Large Screen Adjustments */
        @media screen and (min-width: 900px) {
            h1 { margin: 5px 0; }
            #gameCanvas { max-width: 95vw; max-height: 82vh; }
            .info { margin-top: 5px; }
            #arrow-selection { margin-top: 5px; }
            #gameControlButton { margin-top: 5px !important; }
        }
        .warning-exit {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Orientation Warning Overlay -->
    <div id="orientation-warning">
        <div class="rotate-icon">📱</div>
        <p>Please rotate your phone sideways (Landscape mode) to play Archery.</p>
        <a href="index.html" class="warning-exit">Back to Menu</a>
    </div>

    <a href="index.html" class="exit-button">Back to Menu</a>
    <h1>Archery</h1>
    <canvas id="gameCanvas"></canvas>
    <div class="info">Score: <span id="score">0</span> / <span id="target-score">0</span> | Arrows: <span id="arrows-left">0</span></div>
    <div id="arrow-selection" style="display: none;">
        <button class="arrow-btn selected" data-arrow-type="standard">Standard</button>
        <button class="arrow-btn" data-arrow-type="heavy">Heavy</button>
        <button class="arrow-btn" data-arrow-type="light">Light</button>
    </div>
    <button id="gameControlButton" style="margin-top: 10px; padding: 10px 20px; font-size: 18px;">Start Game</button>
    <script src="archery.js"></script>
</body>
</html>
