<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>100m Swimming</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa; /* Light cyan background */
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: #006064;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .game-container {
            width: 90%;
            max-width: 800px;
            background: #b2ebf2;
            border: 5px solid #0097a7;
            border-radius: 10px;
            padding: 10px;
        }
        .pool {
            position: relative;
            height: 300px;
            background: repeating-linear-gradient(45deg, #00acc1, #00acc1 20px, #00bcd4 20px, #00bcd4 40px);
            border-radius: 5px;
            border: 3px solid #00838f;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            animation: waterMove 3s linear infinite;
        }
        @keyframes waterMove {
            0% { background-position: 0 0; }
            100% { background-position: 56px 0; }
        }
        .lane-divider {
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background-color: rgba(255,255,255,0.4);
            border-top: 2px dashed #ffeb3b; /* Yellow lane rope */
            transform: translateY(-50%);
            z-index: 1;
        }
        .swimmer {
            position: absolute;
            font-size: 45px;
            left: 0;
            transition: left 0.1s linear;
            transform: translateY(-50%) scaleX(-1);
            z-index: 2;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.4));
        }
        
        .finish-line {
            position: absolute;
            right: 15px;
            top: 0;
            bottom: 0;
            width: 8px;
            background-color: #ff5252;
            border-left: 2px solid white;
            border-right: 2px solid white;
            z-index: 3;
        }
        .info-display { margin-top: 20px; font-size: 24px; font-weight: bold; color: #006064; }
        .controls { display: flex; gap: 20px; margin-top: 20px; }
        .tap-button {
            width: 130px;
            height: 80px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 15px;
            border: 3px solid white;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #tapButton1 { background-color: #ff9800; color: #333; } /* Left Arm */
        #tapButton2 { background-color: #4caf50; color: white; } /* Right Arm */
        #restartButton { margin-top: 20px; padding: 10px 20px; font-size: 18px; display: none; }
        
        .settings-container {
            display: flex;
            gap: 10px;
            align-items: center;
            color: #006064;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
        }
        .info-display.countdown { font-size: 72px; font-weight: bold; color: #ff5252; }
        .exit-button {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            z-index: 10;
        }
        #startButton { font-size: 2em; padding: 10px 30px; border-radius: 10px; cursor: pointer; }
        
        /* Best Time & Record styles imported from your existing structure */
        .new-record-msg {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; font-weight: bold; color: #FFD700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px #FFD700;
            z-index: 100; display: none; pointer-events: none;
        }
        
        /* Mobile and small screen adjustments to prevent buttons going off-screen */
        @media screen and (max-width: 768px), screen and (max-height: 650px) {
            h1 { font-size: 22px; margin: 5px 0; }
            .pool { height: 200px; }
            .swimmer { font-size: 32px; }
            .tap-button { width: 110px; height: 60px; font-size: 16px; }
            #startButton { font-size: 1.5em; padding: 10px 20px; }
            #restartButton { margin-top: 10px; padding: 8px 16px; font-size: 16px; }
            .settings-container { font-size: 14px; margin: 5px 0; }
            .info-display { margin-top: 10px; font-size: 18px; }
            .controls { margin-top: 10px; gap: 10px; }
            .game-container { padding: 5px; }
        }
        
        /* Orientation Warning Overlay */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #006064; /* Matching dark cyan theme */
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 22px;
            padding: 20px;
            box-sizing: border-box;
        }
        .rotate-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotateIcon 2s infinite ease-in-out;
        }
        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        @media screen and (max-width: 899px) and (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }
        .warning-exit {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Orientation Warning Overlay -->
    <div id="orientation-warning">
        <div class="rotate-icon">📱</div>
        <p>Please rotate your phone sideways (Landscape mode) to play Swimming.</p>
        <a href="index.html" class="warning-exit">Back to Menu</a>
    </div>

    <a href="index.html" class="exit-button">Back to Menu</a>
    <h1>100m Swimming Match</h1>
    <div class="settings-container">
        <label for="difficultySelect">Difficulty:</label>
        <select id="difficultySelect">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
        </select>
        <div id="bestTimeDisplay" style="margin-left: 20px; font-weight: bold; color: #d32f2f;">Best Time: --</div>
    </div>
    <div class="game-container">
        <div class="pool">
            <div class="lane-divider" style="top: 25%;"></div>
            <div class="lane-divider" style="top: 50%;"></div>
            <div class="lane-divider" style="top: 75%;"></div>
            <div id="player" class="swimmer" style="top: 12.5%;">🏊‍♂️</div>
            <div id="opponent1" class="swimmer" style="top: 37.5%;">🦈</div>
            <div id="opponent2" class="swimmer" style="top: 62.5%;">🐬</div>
            <div id="opponent3" class="swimmer" style="top: 87.5%;">🐳</div>
            <div class="finish-line"></div>
        </div>
    </div>
    <div id="infoDisplay" class="info-display"></div>
    <div class="controls" style="display: none;">
        <button id="tapButton1" class="tap-button">Left Stroke (A)</button>
        <button id="tapButton2" class="tap-button">Right Stroke (L)</button>
    </div>
    <div id="newRecordMsg" class="new-record-msg">New Record! 🎉</div>
    <button id="startButton">Dive In</button>
    <button id="restartButton" style="display: none;">Swim Again</button>

    <script src="swimming.js"></script>
</body>
</html>
