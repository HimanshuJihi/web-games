<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mlampic Games</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            margin-top: 40px;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 4px 6px rgba(0, 0, 0, 0.4);
            letter-spacing: 2px;
        }
        h2 {
            font-weight: 400;
            color: #d1d8e0;
            margin: 0;
            font-size: 1.5rem;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 20px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        .game-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
        }
        .game-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .game-grid { grid-template-columns: 1fr; }
            .game-card { padding: 30px 20px; }
        }
        .reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background-color: rgba(244, 67, 54, 0.8); /* Red/Danger color */
            border: 2px solid rgba(244, 67, 54, 1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
        }
        .reset-btn:hover {
            background-color: rgba(244, 67, 54, 1);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.5);
        }
        .share-btn {
            padding: 10px 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background-color: rgba(33, 150, 243, 0.8); /* Blue color */
            border: 2px solid rgba(33, 150, 243, 1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        .share-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(33, 150, 243, 0.5); }
        .setting-btn {
            padding: 10px 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background-color: rgba(76, 175, 80, 0.8); /* Green color */
            border: 2px solid rgba(76, 175, 80, 1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .setting-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5); }
        .menu-controls { margin-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
        }
        .footer a {
            color: #d1d8e0;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }
        .footer a:hover { color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 Mlampic Games</h1>
        <h2>Select Your Event</h2>
        <div class="menu-controls">
            <button id="toggle-music-btn" class="setting-btn">🎵 Music: ON</button>
            <button id="share-game-btn" class="share-btn">🔗 Share Game</button>
            <button id="reset-progress-btn" class="reset-btn">Reset All Progress</button>
        </div>
    </div>
    
    <div class="game-grid">
        <a href="curling.html" class="game-card">
            <span class="game-icon">🥌</span>
            <span class="game-title">Curling</span>
        </a>
        <a href="sprint.html" class="game-card">
            <span class="game-icon">🏃‍♂️</span>
            <span class="game-title">100m Sprint</span>
        </a>
        <a href="basketball.html" class="game-card">
            <span class="game-icon">🏀</span>
            <span class="game-title">Basketball</span>
        </a>
        <a href="target_practice.html" class="game-card">
            <span class="game-icon">🎯</span>
            <span class="game-title">Target Practice</span>
        </a>
        <a href="archery.html" class="game-card">
            <span class="game-icon">🏹</span>
            <span class="game-title">Archery</span>
        </a>
        <a href="skeet_shooting.html" class="game-card">
            <span class="game-icon">🔫</span>
            <span class="game-title">Skeet Shooting</span>
        </a>
        <a href="swimming.html" class="game-card">
            <span class="game-icon">🏊‍♂️</span>
            <span class="game-title">Swimming</span>
        </a>
        <a href="long_jump.html" class="game-card">
            <span class="game-icon">🏃‍♂️💨</span>
            <span class="game-title">Long Jump</span>
        </a>
        <a href="javelin_throw.html" class="game-card">
            <span class="game-icon">🤺</span>
            <span class="game-title">Javelin Throw</span>
        </a>
    </div>

    <div class="footer">
        <a href="rules.html">How to Play</a> | 
        <a href="about.html">About Us</a> | 
        <a href="privacy.html">Privacy Policy</a> | 
        <a href="terms.html">Terms & Conditions</a>
    </div>

    <script>
        // Settings Logic for Background Music
        const musicBtn = document.getElementById('toggle-music-btn');
        let bgmEnabled = localStorage.getItem('bgmEnabled') !== 'false'; // true by default
        
        function updateMusicBtn() {
            musicBtn.textContent = bgmEnabled ? '🎵 Music: ON' : '🔇 Music: OFF';
            musicBtn.style.backgroundColor = bgmEnabled ? 'rgba(76, 175, 80, 0.8)' : 'rgba(158, 158, 158, 0.8)';
            musicBtn.style.borderColor = bgmEnabled ? 'rgba(76, 175, 80, 1)' : 'rgba(158, 158, 158, 1)';
        }
        updateMusicBtn();

        musicBtn.addEventListener('click', () => {
            bgmEnabled = !bgmEnabled;
            localStorage.setItem('bgmEnabled', bgmEnabled);
            updateMusicBtn();
        });

        // Share Game Logic
        document.getElementById('share-game-btn').addEventListener('click', async () => {
            const shareData = {
                title: 'Mlampic Games',
                text: 'Play amazing HTML5 sports mini-games like Sprint, Archery, and Curling! Can you beat my high score?',
                url: window.location.href // Automatically gets your Netlify URL
            };
            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    // Fallback for older browsers: Copy link to clipboard
                    await navigator.clipboard.writeText(window.location.href);
                    alert('Game link copied to clipboard! Share it with your friends.');
                }
            } catch (err) {
                console.error('Error sharing:', err);
            }
        });

        document.getElementById('reset-progress-btn').addEventListener('click', () => {
            if (confirm('Are you sure you want to reset all your game progress? This cannot be undone.')) {
                localStorage.removeItem('archerySavedLevel');
                localStorage.removeItem('targetSavedLevel');
                localStorage.removeItem('skeetSavedRound');
                localStorage.removeItem('basketballSavedChallenge');
                localStorage.removeItem('sprintBestTime_easy');
                localStorage.removeItem('sprintBestTime_medium');
                localStorage.removeItem('sprintBestTime_hard');
                localStorage.removeItem('sprintBestTime'); // Cleanup old global save
                localStorage.removeItem('swimmingBestTime_easy');
                localStorage.removeItem('swimmingBestTime_medium');
                localStorage.removeItem('swimmingBestTime_hard');
                localStorage.removeItem('longJumpBestScore');
                localStorage.removeItem('javelinBestScore');
                alert('All game progress has been successfully reset!');
            }
        });

        // Register Service Worker for PWA / Offline Support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker setup successful: ', registration.scope);
                }).catch(error => {
                    console.log('ServiceWorker setup failed: ', error);
                });
            });
        }
    </script>
</body>
</html>
