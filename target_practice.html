<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Target Practice</title>
    <meta name="description" content="Play Target Practice on Mlampic Games. Shoot the colored targets before the time runs out!">
    <meta name="keywords" content="target practice game, aiming game, Mlampic Games, sports mini-games">
    <meta property="og:title" content="Target Practice - Mlampic Games">
    <!-- Favicon Setup -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" href="favicon.ico">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #4CAF50; /* Green background */
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px #000000;
        }
        #gameCanvas {
            background-color: #8BC34A; /* Lighter green */
            border: 5px solid #388E3C;
            border-radius: 10px;
            max-width: 90vw;
            max-height: 70vh;
            aspect-ratio: 4 / 3; /* A common aspect ratio for games */
        }
        .info {
            color: white;
            font-size: 24px;
            margin-top: 10px;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-around;
        }
        .exit-button {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background-color: #f44336; /* Red color */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            z-index: 10;
        }

        /* Orientation Warning Overlay */
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #4CAF50; color: white; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; font-size: 22px; padding: 20px; box-sizing: border-box;
        }
        .rotate-icon { font-size: 60px; margin-bottom: 20px; animation: rotateIcon 2s infinite ease-in-out; }
        @keyframes rotateIcon { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (max-width: 899px) and (orientation: portrait) {
            #orientation-warning { display: flex; }
        }
        .warning-exit {
            margin-top: 20px; padding: 10px 20px; background-color: #f44336;
            color: white; text-decoration: none; border-radius: 8px; font-size: 18px;
        }
        @media screen and (max-width: 899px) and (orientation: landscape) {
            h1 { font-size: 18px; margin: 5px 0; }
            #gameCanvas { max-height: 70vh; max-width: 90vw; }
            .info { font-size: 16px; margin-top: 5px; }
            .exit-button { padding: 5px 10px; font-size: 12px; top: 5px; left: 5px; }
            #gameControlButton { margin-top: 5px !important; padding: 5px 15px !important; font-size: 14px !important; }
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1665181964170021"
     crossorigin="anonymous"></script>
</head>
<body>
    <div id="orientation-warning">
        <div class="rotate-icon">📱</div>
        <p>Please rotate your phone sideways (Landscape mode) to play Target Practice.</p>
        <a href="index.html" class="warning-exit">Back to Menu</a>
    </div>

    <a href="index.html" class="exit-button">Back to Menu</a>
    <h1>Target Practice</h1>
    <canvas id="gameCanvas"></canvas>
    <div class="info">Score: <span id="score">0</span> / <span id="target-score">0</span> | Time: <span id="time-left">30</span>s</div>
    <button id="gameControlButton" style="margin-top: 10px; padding: 10px 20px; font-size: 18px;">Start Game</button>
    <script src="target_practice.js"></script>
</body>
</html>
