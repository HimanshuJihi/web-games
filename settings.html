<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Mlampic Games</title>
    <meta name="description" content="Adjust game settings for Mlampic Games.">
    <!-- Favicon Setup -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .content-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            margin-top: 60px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 2.5rem;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 20px;
        }
        .exit-button {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: background 0.3s;
        }
        .exit-button:hover { background-color: rgba(255, 255, 255, 0.4); }
        
        .settings-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
        }
        .setting-item span {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #4CAF50;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .action-buttons {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 12px 25px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid;
        }
        .reset-btn {
            background-color: rgba(244, 67, 54, 0.8);
            border-color: rgba(244, 67, 54, 1);
        }
        .cache-btn {
            background-color: rgba(255, 152, 0, 0.8);
            border-color: rgba(255, 152, 0, 1);
        }
    </style>
</head>
<body>
    <a href="index.html" class="exit-button">← Back</a>
    
    <div class="content-box">
        <h1>⚙️ Settings</h1>
        
        <div class="settings-container">
            <div class="setting-item">
                <span>🎵 Background Music (BGM)</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="bgm-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <span>🔊 Sound Effects (SFX)</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="sfx-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="action-buttons">
            <button id="reset-progress-btn" class="action-btn reset-btn">Reset All Progress</button>
            <button id="clear-cache-btn" class="action-btn cache-btn">Clear Cache & Reload</button>
        </div>
    </div>

    <script src="settings.js"></script>
    <!-- Ad scripts can be added here if needed -->
</body>
</html>
