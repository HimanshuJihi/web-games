<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Basketball Free Throws</title>
    <!-- Favicon Setup -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" href="favicon.ico">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #607D8B; /* A neutral blue-gray background */
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px #000000;
        }
        #gameCanvas {
            background-color: #B0C4DE; /* Light steel blue, like an indoor court */
            border: 5px solid #455A64;
            border-radius: 10px;
            max-width: 90vw;
            max-height: 50vh; /* Reduced to make space for other UI elements */
            aspect-ratio: 2 / 3;
        }
        .info {
            color: white;
            font-size: 24px;
            margin-top: 10px;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-around;
        }
        #challenge-display {
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
            cursor: pointer;
        }
        .exit-button {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background-color: #f44336; /* Red color */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            z-index: 10; /* Ensure it's above other elements */
        }

        /* Orientation Warning Overlay */
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #607D8B; color: white; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; font-size: 22px; padding: 20px; box-sizing: border-box;
        }
        .rotate-icon { font-size: 60px; margin-bottom: 20px; animation: rotateIcon 2s infinite ease-in-out; }
        @keyframes rotateIcon { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (max-width: 899px) and (orientation: portrait) {
            #orientation-warning { display: flex; }
        }
        .warning-exit {
            margin-top: 20px; padding: 10px 20px; background-color: #f44336;
            color: white; text-decoration: none; border-radius: 8px; font-size: 18px;
        }
        @media screen and (max-width: 899px) and (orientation: landscape) {
            h1 { font-size: 18px; margin: 5px 0; }
            #gameCanvas { max-height: 60vh; max-width: 90vw; }
            .info { font-size: 16px; margin-top: 5px; }
            .exit-button { padding: 5px 10px; font-size: 12px; top: 5px; left: 5px; }
            button { padding: 5px 10px; font-size: 14px; margin-top: 5px; }
            #challenge-display { margin-bottom: 5px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <div class="rotate-icon">📱</div>
        <p>Please rotate your phone sideways (Landscape mode) to play Basketball.</p>
        <a href="index.html" class="warning-exit">Back to Menu</a>
    </div>

    <a href="index.html" class="exit-button">Back to Menu</a>
    <h1>Basketball Free Throws</h1>
    <div id="challenge-display"></div>
    <canvas id="gameCanvas"></canvas>
    <div class="info">
        <span>Score: <span id="score">0</span> / <span id="target-score">0</span></span>
        <span id="shot-clock-display" style="display: none;">Time: <span id="shot-clock">5</span></span>
        <span>Shots Left: <span id="shots-left">0</span></span>
    </div>
    <button id="next-challenge-button" style="display: none;">Next Challenge</button>
    <button id="retry-button" style="display: none;">Retry</button>

    <script src="basketball.js"></script>
</body>
</html>
