<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curling Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #13ccff;
            margin: 0;
        }
        canvas {
            border: 2px solid black;
            background-color: #ffffff;
            max-width: 90vw;
            max-height: 70vh; /* Reduced to make space for other UI elements */
            aspect-ratio: 1 / 2;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        p {
            margin-top: 15px;
            margin-bottom: 0;
            font-family: sans-serif;
        }
        .settings {
            margin-bottom: 10px;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .exit-button {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background-color: #f44336; /* Red color */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            z-index: 10; /* Ensure it's above other elements */
        }
    </style>
</head>
<body>
    <a href="index.html" class="exit-button">Back to Menu</a>
        <p style="font-size: 12px; max-width: 400px; text-align: center;"><b>Scoring Rule:</b> At the end of a round, only the team with the stone closest to the center scores. That team gets 1 point for every stone that is closer to the center than the opponent's closest stone.</p>

    <div class="settings">
        <label for="roundsSelect">Rounds:</label>
        <select id="roundsSelect">
            <option value="1">1</option>
            <option value="3" selected>3</option>
            <option value="5">5</option>
        </select>
    </div>
    <canvas id="curlingCanvas"></canvas>
    <p>Drag and release the stone. Hold <b>Sweep</b> while it's sliding!</p>
    <div class="settings">
        <button id="resetButton" disabled>New Game</button>
        <button id="sweepButton" disabled>Sweep</button>
    </div>
    <script src="curling.js"></script>
</body>
</html>
